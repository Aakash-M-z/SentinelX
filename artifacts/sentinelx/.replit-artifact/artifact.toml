kind = "web"
previewPath = "/"
title = "SentinelX"
version = "1.0.0"
id = "artifacts/sentinelx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18462

[services.development]
run = "pnpm --filter @workspace/sentinelx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sentinelx", "run", "build" ]
publicDir = "artifacts/sentinelx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18462"
BASE_PATH = "/"
